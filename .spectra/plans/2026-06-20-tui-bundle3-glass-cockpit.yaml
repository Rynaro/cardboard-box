constants:
  FLUSH_LINES: 64          # coalescer size trigger (tune)
  FLUSH_INTERVAL_MS: 50    # coalescer time trigger (GAP-1 ~50ms)
  LOG_RING_CAP: 2000       # Model LogBuffer cap
  HISTORY_CAP: 1000        # disk retention cap
  HISTORY_FILE: history.jsonl
  SCROLL_STEP: 3           # log/cmdlog scroll lines per wheel notch
  history_key: H           # recommended (l/L taken: l=command-log, L=logs)
  logs_key: L              # recommended

redaction_rule:
  function: redact_argv(argv: &str) -> String
  tokenize: split on space (argv space-joined, cmdlog.rs:110)
  scrub_kv_patterns: [token, secret, password, passwd, apikey, api_key, api-key]   # case-insensitive; KEY=VALUE -> KEY=<redacted>
  scrub_plain_env: "--env KEY=VALUE -> --env KEY=<redacted>"   # argv.rs:98-102
  keep_nameonly_env: "--env KEY (persist=true, value-less) unchanged"   # argv.rs:91-96
  passthrough: [subcommands, box-names, image-refs, --label cbox.*, flags]
  note: secret set value never reaches argv (read from TTY/stdin, cli/secret.rs:124-147); scrubber is defense-in-depth
  applies_to: [disk write, History overlay display]

