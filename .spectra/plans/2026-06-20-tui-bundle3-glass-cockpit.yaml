gap_resolutions_honored:
  GAP-1: coalesce + bounded ring; try_send drop-on-full; result channel sync_channel(32)
  GAP-2: dedicated shell thread (NOT worker); Child + AtomicBool stop-flag + JoinHandle; set-flag->kill->join
  GAP-5: container logs only via build_logs_argv + core::logs (engine call, NOT distrobox subcommand)
  GAP-6: cross-session redacted history.jsonl under $XDG_STATE_HOME/cbox; capture = each real spawn via LoggingRunner

key_decisions:
  D-LOGSCREEN: Screen::Logs (new) over Overlay::Logs — modal/full-screen/stateful; NOT a pane/focus model
  D-ACTION-DEF: history action = each real spawn via LoggingRunner write-hook (cmdlog.rs:108-131), NOT dispatch_action
  D-HANDLES: Child/stop-flag/JoinHandle live SHELL-LOCAL in app.rs (beside Worker, app.rs:113); Model stays pure

