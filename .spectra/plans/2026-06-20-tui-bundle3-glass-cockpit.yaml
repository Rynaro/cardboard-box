  - [S5, S2]            # streaming chain independent of history chain

validation_gates:
  - id: G-BUILD
    command: make build
  - id: G-BUILD-LEAN
    command: make lint-lean
    asserts: no-tui build compiles; new pure modules feature-clean
  - id: G-LINT
    command: make lint
  - id: G-TEST
    command: make test
    asserts: tests/tui_bundle3.rs green; tui_update/effects/theme/bundle1/bundle2/keymap/smoke + CLI suites green
  - id: G-FINAL
    command: make check
  - id: G-LOGLEAK
    asserts: stop flag -> kill -> join; no orphan thread/child after quit (P0)
  - id: G-NOWEDGE
    asserts: UI responsive under log flood; coalesce/ring degrade gracefully (P0)
  - id: G-REDACT
    asserts: secret-bearing argv scrubbed before write (P0)
  - id: G-HISTSAFE
    asserts: corrupt/missing history -> empty, no panic (P1)
  - id: G-MOUSE-RESTORE
    asserts: DisableMouseCapture in restore path covers panic (P1)
  - id: G-COMPAT
    asserts: existing Mocks unchanged via default run_stream (P1)

risk_register:
  - {id: R1, risk: thread/child leak, severity: P0, mitigation: single spawn + single teardown on close/swap/quit/post-loop, set-flag-then-join, kill+reap, gate: G-LOGLEAK}
  - {id: R2, risk: wedged UI, severity: P0, mitigation: dedicated thread (GAP-2) + coalesce/try_send/bounded ring (GAP-1), gate: G-NOWEDGE}
  - {id: R3, risk: secrets on disk, severity: P0, mitigation: redact_argv deny-pattern scrubber, gate: G-REDACT}
  - {id: R4, risk: mouse capture after panic, severity: P1, mitigation: DisableMouseCapture in restore_terminal_once (panic hook calls it), gate: G-MOUSE-RESTORE}
  - {id: R5, risk: corrupt/missing history crash, severity: P1, mitigation: load skips bad lines / missing->empty, gate: G-HISTSAFE}
  - {id: R6, risk: mock breakage from new RunMode/method, severity: P1, mitigation: default run_stream impl + additive RunMode::Stream, gate: G-COMPAT}
  - {id: R7, risk: channel contention drops chunks, severity: P2, mitigation: coalescing keeps rate low; try_send never blocks, gate: G-NOWEDGE}
  - {id: R8, risk: scope creep toward dashboard/focus, severity: P1, mitigation: Screen::Logs is single full-screen (no pane/Rects); scroll-only mouse, gate: review}

confidence_factors:
