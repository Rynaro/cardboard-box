spec_id: 2026-06-19-tui-bundle1-retro-cockpit
title: cbox TUI Bundle 1 "Retro Cockpit"
intent: REQUEST_CHANGE
methodology: SPECTRA
methodology_version: 4.9.1
complexity: 9
confidence: 0.88
decision: AUTO_PROCEED
coder: vivi
micro_task_coder: kupo
release:
  type: feat
  bump: minor
  from: 0.8.0
  to: 0.9.0

build_constraint:
  containerized: true
  never_host_cargo: true
  targets: [make build, make release, make test, make fmt, make fmt-check, make lint, make lint-lean, make check]
  tui_feature_default_on: true
  lean_build_gate: make lint-lean   # builds WITHOUT tui feature; must stay clean

locked_flags:
  cheatsheet_key: "?"
  doctor_rebind_key: "D"
  command_log: echo_only_no_undo
  fuzzy_substrate: nucleo-matcher

voice_rule:
  banned_adjectives: [cozy, beautiful, friendly, delightful, cute, lovely]
  enforced_by: tests/tui_theme.rs::ac_copy_1   # extend list with every new const

ground_truth_anchors:
  model: src/tui/model.rs   # Screen enum 13-20; status field 142; color_mode 156; move_up/down 197-218
  message: src/tui/message.rs   # Key 13-28; Message 47-68
  update: src/tui/update.rs   # handle_key 60-79; handle_key_list 84-211; ?->Doctor 198-205; Tick 30-36; completion handlers 638-878
  view: src/tui/view.rs   # screen dispatch 47-57; modal pattern 51-54,409-468; render_list 96-192; status bar 662-682
  theme: src/tui/theme.rs   # resolve 129-135; truecolor 139-177; ansi16 179-210; nocolor 214-238
  strings: src/tui/strings.rs   # HELP 37-38
  effect: src/tui/effect.rs   # Effect enum 41-69; execute_effect 77-131; send+sync assert 141-142
  app: src/tui/app.rs   # spawn_worker 116-133; run_loop 227-312; run 320-337; sync_channel(4)/(32) 121,236
  runner: src/dbox/runner.rs   # trait 89-96; Invocation::argv 41-45; CmdOutput 49-56
  real_runner: src/dbox/real.rs   # run 8-50; run_interactive 52-77
  mock_runner: src/dbox/mock.rs   # records calls 139-183
  existing_tests:
    - tests/tui_update.rs   # reducer ACs; doctor_question_mark_opens_panel 514-520 (MIGRATE)
    - tests/tui_theme.rs   # pure-helper ACs; nocolor invariant 88-124; AC-COPY-1 246-283
    - tests/tui_effects.rs

data_model:
  new_modules:
    - { path: src/tui/keymap.rs, gated: false, purpose: "KeyBinding + KeyContext + keymap_for + help_line (single source of truth)" }
    - { path: src/tui/filter.rs, gated: "tui", purpose: "fuzzy_rank wrapping nucleo_matcher::Matcher" }
    - { path: src/tui/cmdlog.rs, gated: false, purpose: "CmdLog ring + CmdLogEntry + LoggingRunner decorator" }
  new_model_fields:
    - { name: filter, type: "Option<FilterState>", default: None }
    - { name: overlay, type: "Overlay", default: "Overlay::None" }
    - { name: skin, type: "Skin", default: "Skin::Kraft" }
    - { name: toasts, type: "Vec<Toast>", default: "[]", bound: 3 }
    - { name: cmdlog, type: "Arc<Mutex<CmdLog>>", default: "shared handle from app::run", bound: 200 }
  new_types:
    FilterState: { query: String, matches: "Vec<usize> (indices into boxes)", cursor: usize }
    Overlay: "enum { None, Cheatsheet, CommandLog { scroll: usize } }"
    Skin: "enum { Kraft, Carbon, Blueprint }  // Copy+Eq+Debug; next(), name()"
    ToastKind: "enum { Success, Info, Error }"
    Toast: { kind: ToastKind, text: String, born_tick: usize, ttl_ticks: usize }
    CmdLogEntry: { argv: String, status: "Option<i32>", seq: u64 }
    CmdLog: { buf: "VecDeque<CmdLogEntry>", cap: usize, next_seq: u64 }
  index_mapping:
    rule: "filter NEVER mutates model.boxes"
    effective_selection: "filter.matches[filter.cursor] when filter Some; else direct boxes index"
    nav: "move_up/move_down gain a filter-aware branch; None branch == today verbatim (keeps ac_nav_* green)"
    resync: "on type/backspace and on ListLoaded-while-filtered: recompute matches, clamp cursor, set selected"
  fuzzy_crate:
    choice: nucleo-matcher
    version: "0.3"
    cargo_decl: 'nucleo-matcher = { version = "0.3", optional = true }   # under tui feature (D-2 default)'
    rationale: "Helix-grade, pure Matcher API (Option<u32> score), no async runtime, forward-compatible with the high-level nucleo crate later bundles need"
    rejected: "fuzzy-matcher (SkimMatcherV2) — would force a later swap from the substrate role"

keymap:
  source_of_truth: src/tui/keymap.rs
  list_screen:
    - { key: "↑↓ / j k", action: move }
    - { key: enter, action: open }
    - { key: i, action: inspect }
    - { key: c, action: "pack (create)" }
    - { key: s, action: "seal (stop)" }
    - { key: d, action: "clear out (destroy)" }
    - { key: a, action: apply }
    - { key: e, action: edit }
    - { key: r, action: refresh }
    - { key: "/", action: filter, status: NEW }
    - { key: "?", action: cheatsheet, status: REBIND_from_doctor }
    - { key: D, action: doctor, status: NEW_moved_from_question_mark }
    - { key: t, action: skin, status: NEW, scope: global }
    - { key: l, action: "command-log", status: NEW }
    - { key: "q / esc", action: quit, note: "esc closes overlays first" }
  contexts:
    FilterInput: "type · backspace · ↑↓ move-within-matches · enter keep+close · esc clear+close   (j/k are TEXT here, not nav)"
    Cheatsheet: "any key / esc dismiss"
    CommandLog: "↑↓/j/k scroll · esc/q/l close"
  precedence:
    - "1. Ctrl-C/Ctrl-D -> Quit (even busy)"
    - "2. busy -> drop key"
    - "3. filter.is_some() -> handle_key_filter (intercepts all keys)"
    - "4. overlay match: Cheatsheet any-key/esc close; CommandLog scroll/esc; None fall through"
    - "5. global: Char('t') skin-cycle, Char('?') cheatsheet (reachable any non-busy screen)"
    - "6. match model.screen (existing dispatch + new List arms / l / D)"
  conflicts_resolved:
    - "? was Doctor -> now cheatsheet; Doctor -> D (uppercase, distinct from d=destroy via case-sensitive crossterm Char)"
    - "t, l, / all previously UNBOUND on List"
    - "j/k = TEXT in FilterInput (avoid 'can't type j'); = scroll in CommandLog"

skins:
  resolve_signature: "Theme::resolve(skin: Skin, mode: ColorMode) -> Theme"
  view_call_site: "view.rs:24 -> Theme::resolve(model.skin, model.color_mode)"
  kraft: { status: default_unchanged, truecolor_accent: "Rgb(214,158,92)", ansi16_accent: Yellow }
  carbon: { truecolor_accent_anchor: "Rgb(160,170,180)", ansi16_accent: White }
  blueprint: { truecolor_accent_anchor: "Rgb(90,170,200)", ansi16_accent: Cyan }
  nocolor_tier:
    shared: true
    skin_independent: true
    rule: "NoColor arm ignores skin; returns the one existing nocolor() table (zero fg/bg, modifiers only) -> invariant holds for every skin"
  cycle_copy: "ToastKind::Info  'Skin: kraft|carbon|blueprint'  (from Skin::name())"

toasts:
  coexists_with_status_line: true
  status_line_unchanged: true   # model.status: StatusLine STAYS; tests keep asserting variants
  migration:
    helper_ok: "Model::set_status_ok(msg)  -> status=Ok(msg); push_toast(Success,msg)"
    helper_error: "Model::set_status_error(msg) -> status=Error(msg); push_toast(Error,msg)"
    refactor_sites: "~15 completion handlers (update.rs:659,688,707,730,753,...) call the helpers"
    busy_no_toast: true   # StatusLine::Busy never spawns a toast
  ttl:
    clock: "model.spinner_tick (usize); Tick advances it (update.rs:31)"
    expiry: "in Message::Tick: toasts.retain(|t| now - t.born_tick < t.ttl_ticks)"
    default_ttl_success_info: 60   # ~3s idle
    default_ttl_error: 120         # ~6s idle
  render: "stacked region; bounded to <=3 visible; push drops oldest"

command_log:
  capture_point: "src/dbox/runner.rs:89-96 (DistroboxRunner::run / run_interactive) via LoggingRunner decorator"
  decorator: "LoggingRunner { inner: Arc<dyn DistroboxRunner>, log: Arc<Mutex<CmdLog>> }"
  wire_in: "app::run builds shared Arc<Mutex<CmdLog>>; wraps injected runner BEFORE spawn_worker; same Arc on Model"
  no_effect_change: true   # zero edits to effect.rs/real.rs/core
  no_message_variant: true # view reads model.cmdlog.lock() at render; reducer reads on Tick; no completion Message
  captured: { argv: "space-joined program+args", status: "Option<i32> exit code", excluded: [stdout, stderr, dry_run] }
  bound: 200
  overlay_ux: "Clear + centered Rect over current screen; newest-last; glyph ✓/✗/· by status; scroll via Overlay::CommandLog{scroll}"
  copy:
    title: '" command log "'
    empty: "Nothing has run yet."
    hint: "What cbox ran, newest last. This is a record - it can't undo anything."
    honesty: "explicitly states log cannot reverse a destroy; voice-compliant"

