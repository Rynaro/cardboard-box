execution_plan:
  order: [K1, T1, T2, T3, T4, T5, T6, FINAL]
  parallelizable: [T3, T4, T5, T6]   # siblings off T2 (T6 also needs T1)
  final_gate: make check

validation_gates:
  G-BUILD: make build
  G-LEAN: make lint-lean
  G-FMT: make fmt-check
  G-LINT: make lint
  G-TEST: make test
  G-INVARIANT: "AC-SKIN-NOCOLOR — every skin x every field NoColor fg/bg None"
  G-COEXIST: "AC-TOAST-2 + unchanged tests/tui_update.rs StatusLine assertions"
  G-FINAL: make check

risk_register:
  - { id: R-1, risk: "toast refactor regresses StatusLine tests", severity: P0, mitigation: "additive helpers preserve status=Ok/Error; AC-TOAST-2 + make test" }
  - { id: R-2, risk: "?->D rebind leaves stale failing test", severity: P0, mitigation: "K1 migrates test in same task; AC-REBIND-1/2" }
  - { id: R-3, risk: "filter desyncs selection (out-of-range)", severity: P1, mitigation: "selection via matches[cursor]; clamp on recompute; selected_box .get() safe" }
  - { id: R-4, risk: "new skin leaks color into NoColor", severity: P0, mitigation: "NoColor arm skin-independent; AC-SKIN-NOCOLOR loops all skins" }
  - { id: R-5, risk: "LoggingRunner Send+Sync break / mutex contention", severity: P1, mitigation: "inner Arc<dyn DistroboxRunner> keeps Send+Sync (compile-checked); lock only for push" }
  - { id: R-6, risk: "nucleo-matcher leaks into lean build", severity: P1, mitigation: "gate dep + fuzzy module under tui; make lint-lean must pass" }
  - { id: R-7, risk: "new strings consts trip AC-COPY-1", severity: P1, mitigation: "add consts to list; verb-driven honest copy" }
  - { id: R-8, risk: "can't type j/k into filter query", severity: P2, mitigation: "j/k = TEXT in FilterInput; nav via arrows" }
  - { id: R-9, risk: "Tick-based TTL is wall-clock-imprecise", severity: P2, mitigation: "accepted for transient toasts; documented" }
  - { id: R-10, risk: "esc quits app instead of closing overlay", severity: P1, mitigation: "overlay/filter pre-check before screen dispatch; AC-CHEAT-1/AC-CMDLOG-5/AC-FILTER-4" }

flagged_decisions:
  - { id: D-1, topic: "keymap vs strings::HELP", default: "replace HELP with keymap::help_line; voice-assert keymap actions", blocking: false }
  - { id: D-2, topic: "fuzzy dep gating", default: "nucleo-matcher optional, under tui feature", blocking: false }
  - { id: D-3, topic: "skin names/palettes", default: "Kraft + Carbon + Blueprint", blocking: false, product_signoff_invited: true }
  - { id: D-4, topic: "skin key t / command-log key l", default: "t=skin, l=log (both unbound on List)", blocking: false }

