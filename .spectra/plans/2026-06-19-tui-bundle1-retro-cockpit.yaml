    action_plan: [Create src/tui/keymap.rs (KeyBinding/KeyContext/keymap_for/help_line), Register in mod.rs (ungated), Modify view.rs status bar to use help_line, Modify/remove strings::HELP per D-1, Create tests/tui_keymap.rs]
