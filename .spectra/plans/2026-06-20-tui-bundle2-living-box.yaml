  - {id: R-2, sev: P0, risk: "Action extract-method changes key behavior", mit: "key arms+palette share extracted helpers", gate: [tui_update green, AC-ACTION-3]}
  - {id: R-3, sev: P1, risk: "KeyBinding.action enum migration breaks tui_keymap", mit: "label() == prior strings", gate: [tui_keymap green, AC-ACTION-1]}
  - {id: R-4, sev: P1, risk: "silent refresh races input/overlay/filter/selection", mit: "skip while busy, coalesce in-flight, clamp like handle_list_loaded", gate: [AC-POLL-4, AC-POLL-5]}
  - {id: R-5, sev: P1, risk: "bulk fan-out overflows 4-deep channel (try_send drops)", mit: "group by backend -> <=2 effects", gate: [AC-BULK-FANOUT-1]}
  - {id: R-6, sev: P0, risk: "dangerous bulk op reachable via single keypress", mit: "typed-phrase guard; y only appends", gate: [AC-BULK-DANGER-1, AC-BULK-DANGER-2]}
  - {id: R-7, sev: P1, risk: "nucleo/ratatui/Effect leak into lean build", mit: "poll.rs returns PollKind; action/bulk import pure types; fuzzy stays tui-gated", gate: [make lint-lean]}
  - {id: R-8, sev: P2, risk: "stats poll wrong backend/id", mit: "use BoxRow.id+backend; pin program", gate: [AC-STATS-ARGV-1]}
  - {id: R-9, sev: P1, risk: "kill() leaves zombie / worker blocks", mit: "wait() reaps; watchdog owns child", gate: [AC-TIMEOUT-1, make build]}
  - {id: R-10, sev: P2, risk: "':' / 'b' key collision", mit: "verified unbound; text inside palette", gate: [AC-PALETTE-1, AC-PALETTE-4]}
