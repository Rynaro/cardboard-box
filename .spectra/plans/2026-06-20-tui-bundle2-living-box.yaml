concurrency_design:  # GAP-1
  timeout_seam:
    trait_method: "fn run_with_timeout(&self, inv, timeout: Duration) -> Result<CmdOutput, RunnerError>"
    default_impl: "delegates to run(inv) (ignores timeout) -> existing impls unaffected"
    real_impl: "spawn child; loop try_wait with deadline; child.kill()+wait() on expiry; return Timeout err"
    new_error: "RunnerError::Timeout { program, seconds } -> exit_code = TEMPFAIL(75)"
    poll_grain_ms: 25
    defaults: {STATS_TIMEOUT_SECS: 3, LIST_TIMEOUT_SECS: 5}
    callers: [Effect::SilentLoadList, Effect::StatsPoll]   # ONLY these; rest of CLI unchanged
  poll_gating:
    pure_helper: "should_poll(&Model) -> Option<PollKind>  (src/tui/poll.rs, lean-clean, returns PollKind not Effect)"
    poll_kind: "enum PollKind { List, Stats { id, backend } }"
    fires_iff: ["spinner_tick - last_poll_tick >= POLL_INTERVAL_TICKS(40)", "!busy", "!poll_in_flight"]
    on_dispatch: ["last_poll_tick = spinner_tick", "poll_in_flight = true", "NEVER busy"]
    on_completion: ["poll_in_flight = false", "never busy", "never toast", "never set status"]
    no_freeze_proof: "AC-TIMEOUT-1 (returns within deadline) + AC-POLL-1/2/3 (never busy, coalesced)"

data_model:
  new_model_fields:
    - {name: last_poll_tick, type: usize, init: 0}
    - {name: poll_in_flight, type: bool, init: false}
    - {name: bulk_confirm, type: "Option<BulkConfirmState>", init: None}
    - {name: stats_history, type: "Option<StatsHistory>", init: None}
  new_consts:
    - {name: POLL_INTERVAL_TICKS, value: 40}
    - {name: STATS_HISTORY_CAP, value: 60}
  new_effects:
    - {name: SilentLoadList, worker: true, runner: run_with_timeout, timeout: LIST_TIMEOUT, completion: SilentListLoaded}
    - {name: "StatsPoll(StatsSpec)", worker: true, runner: run_with_timeout, timeout: STATS_TIMEOUT, completion: StatsLoaded}
  new_messages:
    - "SilentListLoaded(Result<Vec<BoxRow>, CboxError>)"
    - "StatsLoaded(Result<StatsSample, CboxError>)"
  bulk_fanout: "reuse Effect::Rm / Effect::Stop with multi-name specs grouped by BoxRow.backend (<=2 effects, under 4-deep channel)"
  action_enum:
    module: src/tui/action.rs  # always-compiled, lean-clean
    variants: [MoveUp, MoveDown, Open, Inspect, Create, Stop, Destroy, Apply, Edit, Refresh, Filter, Cheatsheet, Doctor, CycleSkin, CommandLog, Palette, Quit, BulkPruneStopped, BulkStopRunning, BulkDestroyManaged, BulkDestroyUnmanaged]
    methods: [label, in_palette, default_key, palette_actions]
    keymap_migration: "KeyBinding.action: &str -> Action; cheatsheet/help_line use Action::label()"
    dispatch: "dispatch_action(model, Action) -> Vec<Effect>; key arms + palette both route through extracted helpers"
  new_core:
    - {fn: "build_stats_argv(id)", file: src/dbox/argv.rs, returns: "[stats, id, --no-stream, --format, json]"}
    - {fn: "core::stats(spec, runner, timeout)", file: src/core/mod.rs, engine_call: "Invocation::new(backend.as_str(), ...)"}
    - {fn: "core::list_all_with_timeout(backends, runner, timeout)", file: src/core/mod.rs}
    - {struct: "StatsSpec { id, backend }", file: src/core/spec.rs}
    - {struct: "StatsSample { cpu_pct: f64, mem_used: u64, mem_limit: u64 }", file: src/core/spec.rs}
    - {fn: "parse_stats_json (defensive; empty/null/malformed -> Err, no panic)", file: src/core/mod.rs}
  stats_history:
    cap: 60
    buffers: [cpu (VecDeque<u64>), mem_used (VecDeque<u64>), mem_limit (u64)]
    keyed_by: box_id
    reset_on: [box_change, leave_detail]
    push: "push_sample (bounded ring, drops front past cap)"

keymap_palette_cheatsheet:
  new_keys:
    - {key: ":", action: Palette, scope: global, conflict: none}
    - {key: "b", action: bulk_scoped_palette, scope: list, conflict: none}
  palette:
    overlay_variant: "Overlay::Palette { query, matches, cursor, bulk_only }"
    source: "action::palette_actions() (or bulk subset when bulk_only)"
    ranking: "fuzzy_rank(query, &labels)  # reuses src/tui/filter.rs:26"
    enter: "dispatch_action(model, actions[matches[cursor]])"
    j_k_in_query: text  # nav is arrows only (consistent with filter R-8)
  cheatsheet: "renders keymap_for(ctx) with kb.action.label(); add KeyContext::Palette rows"

bulk_design:  # GAP-2
  predicate_helper: "bulk_targets(op, &[BoxRow]) -> Vec<usize>  (src/tui/bulk.rs, lean-clean)"
  is_running_shared: "extract is_running(status) helper (mirrors update.rs:265-266) for List/Detail/bulk"
  confirm:
    modal: "reuse ConfirmDestroy centered Clear+Rect pattern; render off model.bulk_confirm"
    shows: [target_box_names, count]
    nondangerous: "y/enter confirm, n/esc cancel (single keypress OK)"
    dangerous_destroy_unmanaged:
      guard: typed_phrase
      phrase_const: "strings::BULK_UNMANAGED_PHRASE = \"DESTROY UNMANAGED\""
      execute_iff: "typed_confirm == phrase AND Enter"
      single_keypress_destroys: false
  fanout: "group targets by BoxRow.backend; one Effect::Rm/Stop per group; busy=true, Screen::Progress; existing RmDone/StopDone refresh"
  copy_consts: [BULK_PRUNE_TITLE, BULK_STOP_TITLE, BULK_DESTROY_MANAGED_TITLE, BULK_DESTROY_UNMANAGED_TITLE, BULK_UNMANAGED_WARN, BULK_UNMANAGED_PHRASE, BULK_EMPTY]

