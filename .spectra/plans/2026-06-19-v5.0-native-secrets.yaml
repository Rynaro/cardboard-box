spec_id: 2026-06-19-v5.0-native-secrets
title: "cbox v5.0 — Native Secret Management"
status: DECISION_READY
decision: AUTO_PROCEED
confidence: 0.88
intent: CHANGE
complexity: 9
tier: standard
author: spectra
executor: vivi
build:
  containerized: true
  commands: ["make test", "make check"]
  never: "bare cargo on host"
  feature_matrix: ["default(tui)", "--no-default-features (lean)", "testkit"]

locked_decisions:
  D0: "secret VALUES only in OS keyring; Boxfile references KEYS only"
  D1: "bundle pure-Rust Secret Service client; single static binary; SecretStore trait is a TEST SEAM only"
  D2: "per-secret persist flag; persist=true -> Config.Env (every enter+provision); persist=false -> provision exec only"
  D3: "keyring unavailable/missing -> refuse, exit 75, run NOTHING; name the KEY; never plaintext fallback"
  D4: "lean v1; defer prompt-as-source; minimal command surface"

verified_mechanism:
  proven_on: "podman 5.8.2 + distrobox 1.8.2.4"
  invariant: "secret VALUE rides cbox->distrobox child-process env; only KEY NAME in argv"
  persist_true: 'distrobox create ... --additional-flags "--env KEY"  with KEY=value on child env -> podman bakes KEY=value into Config.Env'
  persist_false: 'distrobox enter --name X --additional-flags "--env KEY" -- sh -c "<run>"  with KEY=value on child env -> exec session only; Config.Env count=0'
  seam: "Invocation.with_env (runner.rs:35) applied via cmd.env (real.rs:22-24,55-57); same seam as DBX_CONTAINER_MANAGER"

decisions_made:
  persist_default: true
  include_env_table: true
  top_level_deny_unknown_fields: false   # keep off; extend known_top_level allowlist instead
  secret_entry_deny_unknown_fields: true
  crate: "keyring v3, default-features=false, features=[sync-secret-service, crypto-rust]; + rpassword 7"
  namespacing: 'Entry::new("cbox", "<box>/<KEY>")'
  command_surface: ["secret set", "secret list", "secret rm"]   # no get/show command, ever
  inspect_raw_masking: true   # mask known secret keys in cbox OWN output; podman inspect still shows them
  doctor_keyring_line: true   # non-fatal
  rotation: "out of diff scope; explicit user workflow (set + re-enter / set + apply --recreate)"

schema:
  secrets_table:
    type: "BTreeMap<String, SecretEntry>"
    entry: "{ persist: bool = true, from: String = 'keyring' }"
    deny_unknown_fields: true
  env_table:
    type: "BTreeMap<String, String>"
    note: "plaintext non-secret env; value-in-argv allowed"

validation_rules:
  - id: V1
    rule: "secrets+env KEY matches ^[A-Za-z_][A-Za-z0-9_]*$"
    exit: 65
  - id: V2
    rule: "no KEY in both [env] and [secrets]"
    exit: 65
  - id: V3
    rule: "secrets.<KEY>.from in {keyring}"
    exit: 65
  - id: V4
    rule: "secrets.len + env.len <= 64"
    exit: 65
  - id: V5
    rule: "1 <= KEY.len <= 128"
    exit: 65
  - id: V6
    rule: "[env] value len <= 4096"
    exit: 65
  note: "validation is PURE; no keyring access; key-existence checked at injection, not validation"

secret_store_trait:
  methods:
    - "set(box,key,value) -> Result<(),SecretError>"
    - "get(box,key) -> Result<Option<String>,SecretError>"
    - "delete(box,key) -> Result<(),SecretError>"
    - "list(box) -> Result<Vec<String>,SecretError>  # KEY names only"
  error_to_exit:
    Unavailable: 75
    NotFound_at_injection: 75
    Backend: 70
  real_impl: KeyringStore
  mock_impl: "MockSecretStore (cfg(any(test, feature='testkit')))"

injection:
  create_path:
    spec_fields_added: ["env_flags: Vec<String>", "env_values: Vec<(String,String)>", "plain_env: Vec<(String,String)>"]
    argv: 'after docker extra_flags, before label tail (argv.rs:97): for secret KEY -> --additional-flags "--env KEY"; for [env] K=v -> --additional-flags "--env K=v"'
    env: "core::create attaches secret VALUES via Invocation.with_env"
    resolution: "resolve_secret_env(name,&bf.secrets,Persisted,store) BEFORE core::create spawns; all-or-nothing; exit 75 on miss"
  provision_path:
    plan_fields_added: ["provision_env: &[(String,String)]", "provision_env_keys: &[String]"]
    argv: "build_provision_shell_argv_with_env -> enter --name N --additional-flags '--env K' -- sh -c run"
    env: "run_step Shell attaches persist=false VALUES via with_env; copy steps unchanged (no env)"
    persist_true_note: "already in Config.Env from create; provision does NOT re-inject them"
    resolution: "resolve_secret_env(name,&bf.secrets,ProvisionOnly,store) ONCE before walk; all-or-nothing; exit 75"
  hard_invariant:
    id: INV-1
    statement: "no secret VALUE in any recorded argv; only --env KEY (name-only); VALUE only in Invocation.env"
    checkable_via: "MockRunner RecordedCall {args, env}"

redaction:
  S1_step_failure: "no scrubber; assert INV-1 (argv has no value)"
  S2_verbose_argv: "no scrubber; assert INV-1"
  S3_inspect_raw:
    mask: true
    how: "resolve box Boxfile via cbox.boxfile_path label; rewrite Config.Env KEY=val -> KEY=*** for known secret keys; if Boxfile unresolvable, mask nothing + stderr note"
    caveat: "host podman inspect still shows persist=true values (inherent to D2); document loudly"
  S3_inspect_json: "stays safe; InspectResult has no env field (only HOME extracted); add regression test"
  S4_hashes_state: "secret values NEVER enter any hash or provision.json; step hash is over run text (no value); fingerprint is metadata-only"

diff_fingerprint:
  fingerprint: "sha256 over sorted {key,persist,from} for secrets + sorted {key} for env; NO values"
  stored_in: "ProvisionState.env_secret_fingerprint + secret_specs[] + env_keys[] (all serde-default, metadata only)"
  participates_in_converge: true
  classification:
    no_change: "fingerprint matches -> proceed"
    incremental: "only persist=false / [env] keys added/removed/toggled -> re-run provision, write new fp"
    recreate: "ANY persist=true key added/removed OR persist flipped -> DiffField{field:secrets,class:Recreate} -> existing recreate machinery (exit 65 w/o --recreate)"
  anti_pattern_guard: "MUST be actually checked AND read back (not assumed-unchanged like sandbox, not write-once like boxfile_sha which is declared-but-never-written). AC-DIFF-3 proves read-back."
  rotation_out_of_scope:
    persist_false: "cbox secret set <box> <KEY> ; then re-enter / cbox apply --redo <idx>"
    persist_true: "cbox secret set <box> <KEY> ; then cbox apply <box> --recreate"

command_surface:
  secret_set:
    args: "<BOX> <KEY>"
    input: "hidden TTY prompt (rpassword) OR stdin first-line when non-TTY (CI)"
    never: "echoes the value; stores any value in argv/json"
    empty_value_exit: 64
    bad_key_exit: 65
    json: '{ok:true, action:secret-set, box, key}'
  secret_list:
    args: "<BOX>"
    output: "KEY names only; never values; does not show persist (lives in Boxfile)"
    json: '{ok:true, box, keys:[...]}'
  secret_rm:
    args: "<BOX> <KEY>"
    idempotent: true
    json: '{ok:true, action:secret-rm, box, key}'
  global_flags_honored: ["--json", "-q/--quiet", "--no-color", "-v"]

doctor:
  add_field: "keyring: { available: bool, detail: String }"
  probe: "non-destructive get('__cbox_doctor__','__probe__'); Ok->available; Err(Unavailable)->not"
  fatal: false   # ok stays gated on distrobox+backend

acceptance:
  - {id: AC-SEC-1, gwt: "persist=true set+up -> create call has --env KEY in args, value in env, value NOT in args"}
  - {id: AC-SEC-2, gwt: "persist=false -> provision enter has --env KEY + value in env; create lacks it; never in Config.Env"}
  - {id: AC-SEC-3, gwt: "missing key -> exit 75, msg names KEY + 'cbox secret set', MockRunner.call_count==0"}
  - {id: AC-SEC-4, gwt: "keyring Unavailable -> exit 75, unlock msg, call_count==0"}
  - {id: AC-SEC-5, gwt: "step-failure argv (S1) + verbose argv (S2) contain no secret value"}
  - {id: AC-SEC-6, gwt: "bad key name / dup key / from=prompt -> exit 65 with named field"}
  - {id: AC-DIFF-1, gwt: "secret add/remove (persist=false) re-converges Incremental + writes fp"}
  - {id: AC-DIFF-2, gwt: "persist flip -> exit 65 needs-recreate; with --recreate -> recreated w/ --env KEY persisted"}
  - {id: AC-DIFF-3, gwt: "fresh provision writes fp; second apply same Boxfile -> no secret change (fp read back), steps skipped"}
  - {id: AC-INSPECT-1, gwt: "inspect --raw masks known secret keys -> KEY=*** ; value absent"}
  - {id: AC-INSPECT-2, gwt: "projected inspect --json never contains secret value"}
  - {id: AC-CLI-1, gwt: "secret set via piped stdin stores value; output contains no value"}
  - {id: AC-CLI-2, gwt: "secret list prints names only; --json keys array only"}
  - {id: AC-CLI-3, gwt: "secret rm on absent key -> exit 0 (idempotent)"}
  - {id: AC-ROUNDTRIP-1, gwt: "full up round-trip: every argv has only KEY names; env carries KEY=value"}
  - {id: AC-DOCTOR-1, gwt: "keyring Unavailable -> doctor.ok unchanged; keyring.available=false w/ detail"}

file_touch_map:
  changed:
    Cargo.toml: "add keyring(v3,default-features=false,sync-secret-service,crypto-rust)+rpassword7; testkit-gate MockSecretStore"
    src/boxfile/model.rs: "add secrets+env maps + SecretEntry(deny_unknown_fields,persist default true,from keyring)"
    src/boxfile/mod.rs: "extend known_top_level with secrets,env"
    src/boxfile/validate.rs: "ENV_NAME_REGEX,is_valid_env_name,V1-V6"
    src/core/spec.rs: "CreateSpec.env_flags/env_values/plain_env; DoctorResult.keyring"
    src/dbox/argv.rs: "build_create_argv secret/env flags; build_provision_shell_argv_with_env"
    src/core/provision.rs: "ProvisionPlan.provision_env/provision_env_keys; run_step Shell attaches env"
    src/core/state_store.rs: "ProvisionState.env_secret_fingerprint/secret_specs/env_keys (serde default)"
    src/core/diff.rs: "env_secret_fingerprint(bf); diff_secrets -> Incremental/Recreate; secrets DiffField"
    src/core/mod.rs: "resolve+attach secrets in create/apply/apply_fresh/up/recreate; compute+persist fp+classify; doctor probe; inspect_raw masking"
    src/cli/create.rs: "resolve secrets before core::create; plain_env from bf.env"
    src/cli/up.rs: "same as create.rs"
    src/cli/inspect.rs: "pass known secret keys into inspect_raw masking"
    src/cli/doctor.rs: "pass SecretStore; render keyring line"
    src/cli/mod.rs: "register Secret subcommand"
    src/main.rs: "build KeyringStore; thread into dispatch; dispatch Secret"
    src/cli/output.rs: "render_doctor keyring line"
    README.md: "document tables, secret cmd, rotation, podman-inspect caveat, exit-75 behavior"
  new:
    src/secret/mod.rs: "SecretStore trait, SecretError, namespacing"
    src/secret/keyring_store.rs: "KeyringStore real impl"
    src/secret/mock.rs: "MockSecretStore (testkit)"
    src/core/secret_inject.rs: "resolve_secret_env, SecretScope, fingerprint"
    src/cli/secret.rs: "secret set|list|rm handlers + hidden/stdin read"
  new_tests:
    tests/secret.rs: "AC-CLI-1/2/3"
    tests/secret_inject.rs: "AC-SEC-1..5, AC-ROUNDTRIP-1"
    tests/secret_diff.rs: "AC-DIFF-1/2/3"
    tests/secret_validate.rs: "AC-SEC-6"
    tests/secret_inspect.rs: "AC-INSPECT-1/2"
    tests/secret_doctor.rs: "AC-DOCTOR-1"

implementation_order:
  - "1. schema+validation (model/mod/validate) + tests/secret_validate"
  - "2. SecretStore trait + MockSecretStore (no real crate)"
  - "3. resolve_secret_env + fingerprint vs mock"
  - "4. create-path injection (spec/argv/core::create/cli create+up) + tests/secret_inject AC-SEC-1/3/4 INV-1"
  - "5. provision-path injection (provision/argv builder) + AC-SEC-2/5"
  - "6. diff/fingerprint wiring (state_store/diff/core::apply) + tests/secret_diff AC-DIFF-1/2/3"
  - "7. inspect --raw masking + tests/secret_inspect"
  - "8. cbox secret CLI (cli/secret, cli/mod, main) + tests/secret; add rpassword"
  - "9. real KeyringStore + main wiring + doctor probe/line + tests/secret_doctor; verify make build resolves crate"
  - "10. README + make check (fmt+clippy both feature configs+build+release+test)"

agent_hints:
  agent_class: "Builder (speed) for 1-3,7,8; Reasoner (reasoning) for 4-6,9 (security-sensitive wiring + diff classification)"
  validation_gates: ["G-MOCK", "G-NO-NET", "G-INV1-no-value-in-argv", "G-EXIT (65/75)", "G-JSON", "G-FEATURE-MATRIX (lean+tui)", "make check"]
  context_files:
    - "src/dbox/runner.rs (with_env seam)"
    - "src/dbox/real.rs (cmd.env)"
    - "src/dbox/argv.rs (build_create_argv, provision builders)"
    - "src/core/provision.rs (run_step, ProvisionPlan)"
    - "src/core/mod.rs (create/apply/up/inspect_raw/doctor)"
    - "src/core/state_store.rs (ProvisionState, boxfile_sha is declared-but-never-written)"
    - "src/core/diff.rs (box.home blind-spot pattern to AVOID; recreate classification)"
    - "src/boxfile/model.rs + validate.rs + mod.rs allowlist"
    - "src/dbox/mock.rs (RecordedCall args+env)"

residual_risk:
  OQ-1: "confirm keyring/secret-service/zbus vendor+build inside offline cbox-dev image (make build); ruling only if it fails"
  OQ-2: "keyring v3 list() enumeration may need fallback (intersect Boxfile keys with keyring probes); ruling only if clean API absent"
  OQ-3: "lean (--no-default-features) build must compile keyring/rpassword; keep deps unconditional, not tui-gated"
  RR-1: "host podman inspect still shows persist=true values (inherent to D2); README must state it"
  RR-2: "/proc/<pid>/environ readable by same user; standard env-injection cost; better than argv; note in README"
  RR-3: "from=prompt deferred (V3 rejects); fingerprint+resolution must learn it when shipped"

confidence_factors:
  pattern_match: 0.90
  requirement_clarity: 0.95
  decomposition_stability: 0.85
  constraint_compliance: 0.84
  aggregate: 0.88
